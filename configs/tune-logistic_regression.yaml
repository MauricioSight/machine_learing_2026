train_config: logistic_regression

framework: optuna
algorithm: tpe

n_trials: 30
objective_metric: [error_rate, mean]
direction: minimize

search_space:
  modeling-training-learning_rate: [categorical, 0.01, 0.001, 0.0001, 0.00001]
  modeling-training-num_epochs: [int, 10, 1000, 10]
  modeling-training-batch_size: [categorical, 32, 64, 128]