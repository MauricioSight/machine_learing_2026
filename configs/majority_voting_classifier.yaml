phase: tunning

tracker:
  project_name: aprendizagem_maquina_projeto

data_loader:
  name: ionosphere

pre_processing:
  name: none

modeling:
  structure:
    name: majority_voting_classifier

    # Logistic regression
    input_dim: 34
    num_classes: 2
    
    # bayes_parzen
    h: 1.0

    # bayes_knn
    k: 5
    dist_metric: euclidean # [euclidean, city_block, chebyshev]
  
  training:
    name: stratified_k_fold_tunning_train
    n_repeats: 30
    tunning_config: tune-majority_voting_classifier

    # Logistic regression
    optimizer: adam
    weight_decay: 0.0
    learning_rate: 0.001
    num_epochs: 10
    batch_size: 64

metrics:
  name: bayes_classifier_metrics
