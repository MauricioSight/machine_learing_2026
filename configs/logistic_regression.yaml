phase: train

tracker:
  project: MINIST

data_loader:
  name: ionosphere

pre_processing:
  name: none

modeling:
  structure:
    name: logistic_regression 
    input_dim: 34
    num_classes: 2
  
  training:
    name: stratified_k_fold
    criterion: cross_entropy_loss
    learning_rate: 0.001
    num_epochs: 10
    es_patience: 5
    batch_size: 64

  inference:
    name: dnn_class
    batch_size: 64

metrics:
  name: binary
