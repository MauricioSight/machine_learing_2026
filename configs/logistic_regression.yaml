phase: tunning

tracker:
  project_name: aprendizagem_maquina_projeto

data_loader:
  name: ionosphere_KCM_K_GH

pre_processing:
  name: none

modeling:
  structure:
    name: logistic_regression 
    input_dim: 34
    num_classes: 2
  
  training:
    name: stratified_k_fold_tunning_train
    n_repeats: 30
    tunning_config: tune-logistic_regression
    optimizer: adam
    weight_decay: 0.0
    learning_rate: 0.001
    num_epochs: 10
    batch_size: 64

metrics:
  name: logistic_multi_classifier_metrics
